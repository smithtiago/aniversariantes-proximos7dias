<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aniversariantes - compacto</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#f6f7fb;
      --line:#e6e9f3;
      --text:#131130;
      --muted:#6d7488;
      --brand:#242362;
      --brand2:#4577a9;
      --gold:#d8a11a;
      --shadow:0 12px 30px rgba(19,17,48,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:transparent;font-family:Inter,Arial,sans-serif;color:var(--text)}
    body{padding:10px;overflow:hidden}
    .widget{
      width:100%;
      max-width:980px;
      margin:0 auto;
      background:linear-gradient(135deg,#fff 0%,#fbfbfe 100%);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .top{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:16px;
      align-items:center;
      padding:16px 18px 12px;
      background:linear-gradient(135deg,var(--brand) 0%, var(--brand2) 100%);
      color:#fff;
      position:relative;
    }
    .top:after{
      content:"";
      position:absolute;
      right:-45px; top:-28px;
      width:140px;height:140px;border-radius:50%;
      background:rgba(255,255,255,.09)
    }
    .eyebrow{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.12);
      font-size:11px;font-weight:700;letter-spacing:.04em;
      margin-bottom:10px
    }
    .title{margin:0;font-size:27px;line-height:1.05;font-weight:700}
    .summary{
      position:relative;z-index:1;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;padding:12px 14px;min-width:150px
    }
    .summary .n{font-size:32px;font-weight:800;line-height:1}
    .summary .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.76);margin-bottom:6px}
    .summary .s{font-size:12px;color:rgba(255,255,255,.85);margin-top:5px}
    .controls{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:12px 18px;border-bottom:1px solid var(--line);background:#fff;
    }
    .periodo{font-size:14px;font-weight:700}
    .periodo small{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-top:4px}
    .side{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;
      background:#f2f4fb;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--brand)
    }
    .dot{width:9px;height:9px;border-radius:50%;background:var(--brand2)}
    .dot.today{background:var(--gold)}
    .nav{display:flex;gap:8px}
    .btn{
      width:36px;height:36px;border:1px solid var(--line);background:#fff;border-radius:12px;
      display:grid;place-items:center;cursor:pointer;color:var(--brand);font-size:18px;font-weight:700;
      box-shadow:0 4px 10px rgba(19,17,48,.04)
    }
    .btn:hover{background:#f7f8fc}
    .viewport{padding:14px 18px 18px;background:linear-gradient(180deg,#fff 0%,#fafbfe 100%)}
    .track{display:flex;gap:14px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:4px;scrollbar-width:none}
    .track::-webkit-scrollbar{display:none}
    .card{
      min-width:220px; max-width:220px; flex:0 0 220px;
      background:linear-gradient(180deg,#fff 0%,#fbfcff 100%);
      border:1px solid var(--line); border-radius:20px; padding:16px; position:relative; overflow:hidden;
      box-shadow:0 8px 20px rgba(19,17,48,.05)
    }
    .card.today{background:linear-gradient(180deg,#fff9ed 0%,#fff4df 100%);border-color:#f1d38a}
    .card:after{
      content:"";position:absolute;right:-28px;top:-28px;width:88px;height:88px;border-radius:50%;
      background:linear-gradient(135deg,rgba(69,119,169,.12),rgba(69,119,169,0))
    }
    .avatar{
      width:46px;height:46px;border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;
      box-shadow:0 8px 18px rgba(36,35,98,.18);position:relative;z-index:1
    }
    .when{
      display:inline-flex;margin:14px 0 10px;padding:6px 9px;border-radius:999px;
      background:#eef1ff;color:var(--brand);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em
    }
    .card.today .when{background:#fff1cc;color:#8d6300}
    .name{
      font-size:16px;line-height:1.22;font-weight:800;margin:0 0 12px;
      position:relative;z-index:1;text-transform:uppercase
    }
    .meta{position:relative;z-index:1}
    .meta .label{
      font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:.02em
    }
    .meta .date{
      font-size:18px;font-weight:800;color:var(--brand);line-height:1.1
    }
    .card.today .meta .date{color:#8d6300}
    .empty{padding:28px 20px;text-align:center;color:var(--muted);font-size:14px}
    @media (max-width: 760px){
      body{padding:0}
      .widget{border-radius:20px}
      .top{grid-template-columns:1fr}
      .title{font-size:22px}
      .controls{align-items:flex-start;flex-direction:column}
      .side{width:100%;justify-content:space-between}
      .card{min-width:200px;max-width:200px;flex-basis:200px}
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="top">
      <div>
        <div class="eyebrow">🎉 É festa!</div>
        <h1 class="title">Aniversariantes dos próximos 7 dias</h1>
      </div>
      <div class="summary">
        <div class="l">Total no período</div>
        <div class="n" id="totalCount">0</div>
        <div class="s" id="summaryText">Carregando...</div>
      </div>
    </div>

    <div class="controls">
      <div class="periodo" id="periodoTexto">Período: carregando...
        <small>Hoje + próximos 6 dias</small>
      </div>
      <div class="side">
        <div class="chip"><span class="dot"></span>Próximos dias</div>
        <div class="chip"><span class="dot today"></span>Hoje</div>
        <div class="nav">
          <button class="btn" id="prevBtn" aria-label="Anterior">‹</button>
          <button class="btn" id="nextBtn" aria-label="Próximo">›</button>
        </div>
      </div>
    </div>

    <div class="viewport">
      <div class="track" id="track"></div>
      <div class="empty" id="empty" style="display:none;">Nenhum aniversariante nos próximos 7 dias.</div>
    </div>
  </div>

  <script>
    const arquivo = 'aniversariantes-proximos-7-dias.json';
    const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

    function parseDateSafe(value){
      if(!value) return null;
      if (typeof value === 'string' && value.includes('-')) {
        const d = new Date(value + 'T00:00:00');
        if (!isNaN(d)) return d;
      }
      const d = new Date(value);
      if (!isNaN(d)) return d;
      return null;
    }

    function initials(nome=''){
      const parts = nome.trim().split(/\s+/).filter(Boolean);
      return parts.slice(0,2).map(p=>p[0]?.toUpperCase()||'').join('');
    }

    function normalize(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

    function nextBirthdayDate(birth, today){
      let candidate = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
      if (candidate < today) candidate = new Date(today.getFullYear()+1, birth.getMonth(), birth.getDate());
      return candidate;
    }

    function diffDays(a,b){ return Math.round((normalize(a)-normalize(b))/86400000); }

    function whenLabel(days){
      if(days === 0) return 'Hoje';
      if(days === 1) return 'Amanhã';
      return `Em ${days} dias`;
    }

    function formatNumericDate(date){
      return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}`;
    }

    async function init(){
      try{
        const res = await fetch(arquivo, {cache:'no-store'});
        const data = await res.json();

        const today = normalize(new Date());
        const end = new Date(today); end.setDate(today.getDate()+6);

        document.getElementById('periodoTexto').innerHTML = `Período: ${today.getDate()} de ${meses[today.getMonth()]} a ${end.getDate()} de ${meses[end.getMonth()]}<small>Hoje + próximos 6 dias</small>`;

        const upcoming = data.map(item => {
          const birth = parseDateSafe(item.DATANASCIMENTO || item.data || item.DataNascimento);
          if(!birth) return null;
          const nextDate = nextBirthdayDate(birth, today);
          const days = diffDays(nextDate, today);
          return {
            nome: item.NOME || item.nome || 'Sem nome',
            nascimento: birth,
            proximo: nextDate,
            dias: days
          };
        }).filter(Boolean).filter(p => p.dias >= 0 && p.dias <= 6).sort((a,b)=>a.dias-b.dias || a.proximo-b.proximo || a.nome.localeCompare(b.nome,'pt-BR'));

        document.getElementById('totalCount').textContent = upcoming.length;
        document.getElementById('summaryText').textContent = upcoming.length === 1 ? '1 aniversário no período' : `${upcoming.length} aniversários no período`;

        const track = document.getElementById('track');
        const empty = document.getElementById('empty');

        if(!upcoming.length){ empty.style.display='block'; return; }

        track.innerHTML = upcoming.map(p => `
          <article class="card ${p.dias===0?'today':''}">
            <div class="avatar">${initials(p.nome)}</div>
            <div class="when">${whenLabel(p.dias)}</div>
            <h3 class="name">${p.nome}</h3>
            <div class="meta">
              <div class="label">Data</div>
              <div class="date">${formatNumericDate(p.proximo)}</div>
            </div>
          </article>
        `).join('');

        const scrollAmount = 240;
        document.getElementById('prevBtn').onclick = () => track.scrollBy({left:-scrollAmount,behavior:'smooth'});
        document.getElementById('nextBtn').onclick = () => track.scrollBy({left:scrollAmount,behavior:'smooth'});
      } catch(e){
        document.getElementById('summaryText').textContent = 'Não foi possível carregar os dados';
        document.getElementById('empty').style.display='block';
        document.getElementById('empty').textContent = 'Erro ao carregar o JSON. Verifique se o HTML e o JSON estão na mesma pasta do GitHub Pages.';
      }
    }
    init();
  </script>
</body>
</html>
