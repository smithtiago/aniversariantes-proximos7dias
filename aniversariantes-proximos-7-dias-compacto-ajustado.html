<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#242362;
  --azul-claro:#eef2ff;
  --azul-chip:#3d5fa8;
  --dourado:#d7a526;
  --borda:#d8dfeb;
  --fundo:#f6f8fb;
  --texto:#242362;
  --texto-sec:#6b7288;
  --radius:2px;
  --gap:14px;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  background:transparent;
  font-family:"Segoe UI", Arial, sans-serif;
  overflow:hidden;
}

.widget{
  width:100%;
  background:#fff;
  border:1px solid var(--borda);
  border-radius:var(--radius);
  overflow:hidden;
}

/* HEADER */
.header{
  background:var(--azul);
  color:#fff;
  padding:16px 18px;
}

.badge{
  display:inline-flex;
  gap:6px;
  background:rgba(255,255,255,.16);
  padding:5px 11px;
  border-radius:999px;
  font-size:11px;
  margin-bottom:8px;
}

.header h2{
  margin:0;
  font-size:28px;
  font-weight:700;
}

/* SUBBAR */
.subbar{
  background:var(--fundo);
  padding:12px 18px;
  border-bottom:1px solid var(--borda);
}

.periodo{
  font-size:13px;
  margin-bottom:10px;
}

.controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chips{
  display:flex;
  gap:10px;
}

.chip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 12px;
  border-radius:999px;
  background:#eef1f7;
  font-size:12px;
}

.chip-dot{
  width:8px;
  height:8px;
  border-radius:50%;
}

.proximos{ background:var(--azul-chip); }
.hoje{ background:var(--dourado); }

/* NAV */
.nav button{
  width:30px;
  height:30px;
  border-radius:10px;
  border:1px solid #d9e0ec;
  background:#fff;
  cursor:pointer;
  font-weight:700;
}

/* CARDS */
.cards-wrap{
  padding:14px 18px;
}

.viewport{
  overflow:hidden;
}

.track{
  display:flex;
  gap:var(--gap);
  transition:transform .5s ease;
}

.card{
  border:1px solid var(--borda);
  border-radius:var(--radius);
  padding:16px;
  min-height:150px;
  background:#fff;
  flex-shrink:0;
}

.days-tag{
  background:var(--azul-claro);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  margin-bottom:12px;
  display:inline-block;
}

.name{
  font-size:13px;
  font-weight:600;
  margin-bottom:12px;
}

.date{
  font-size:16px;
  font-weight:700;
  color:var(--azul);
}

</style>
</head>

<body>

<div class="widget">

  <div class="header">
    <div class="badge">🎉 É festa!</div>
    <h2>Aniversariantes dos próximos 7 dias</h2>
  </div>

  <div class="subbar">
    <div class="periodo" id="periodo"></div>

    <div class="controls">
      <div class="chips">
        <div class="chip"><span class="chip-dot proximos"></span>Próximos dias</div>
        <div class="chip"><span class="chip-dot hoje"></span>Hoje</div>
      </div>

      <div class="nav">
        <button onclick="prev()">‹</button>
        <button onclick="next()">›</button>
      </div>
    </div>
  </div>

  <div class="cards-wrap">
    <div class="viewport">
      <div class="track" id="track"></div>
    </div>
  </div>

</div>

<script>
const track = document.getElementById('track');
const periodoEl = document.getElementById('periodo');

let dataFiltrada = [];
let index = 0;
let visible = 3;
let cardWidth = 0;

/* 🔥 AQUI ESTÁ O AJUSTE PRINCIPAL */
function getVisible(){
  const largura = document.querySelector('.widget').clientWidth;

  if (largura < 500) return 1;
  if (largura < 900) return 2;
  return 3;
}

function formatDate(d){
  return d.toLocaleDateString('pt-BR',{day:'numeric',month:'long'});
}

function processar(data){

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const fim = new Date(hoje);
  fim.setDate(hoje.getDate()+6);

  periodoEl.innerHTML = `<strong>Período:</strong> ${formatDate(hoje)} a ${formatDate(fim)}`;

  dataFiltrada = data.map(p => {
    const [ano,mes,dia] = p.DATANASCIMENTO.split('-').map(Number);
    const dataAtual = new Date(hoje.getFullYear(), mes-1, dia);

    const diff = Math.round((dataAtual-hoje)/(1000*60*60*24));

    if(diff >=0 && diff <=6){
      return {
        nome:p.NOME,
        dia,
        mes,
        diff,
        tag: diff===0?'HOJE': diff===1?'AMANHÃ':`EM ${diff} DIAS`
      }
    }
  }).filter(Boolean).sort((a,b)=>a.diff-b.diff);

  render();
}

function render(){

  track.innerHTML = dataFiltrada.map(p => `
    <div class="card">
      <div class="days-tag">${p.tag}</div>
      <div class="name">${p.nome}</div>
      <div class="date">${String(p.dia).padStart(2,'0')}/${String(p.mes).padStart(2,'0')}</div>
    </div>
  `).join('');

  visible = getVisible();
  applyWidths();
  update();
}

function applyWidths(){
  const total = document.querySelector('.viewport').clientWidth;
  const gap = 14;

  cardWidth = (total - (gap * (visible - 1))) / visible;

  document.querySelectorAll('.card').forEach(c=>{
    c.style.width = cardWidth + 'px';
  });
}

function update(){
  const gap = 14;
  const offset = index * (cardWidth + gap);
  track.style.transform = `translateX(-${offset}px)`;
}

function next(){
  index = Math.min(index+1, dataFiltrada.length-visible);
  update();
}

function prev(){
  index = Math.max(index-1,0);
  update();
}

window.addEventListener('resize',()=>{
  visible = getVisible();
  applyWidths();
  update();
});

fetch('aniversariantes-proximos-7-dias.json?t=' + new Date().getTime())
  .then(r=>r.json())
  .then(processar);
</script>

</body>
</html>
