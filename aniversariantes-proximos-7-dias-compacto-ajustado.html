<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:transparent;
}

.container{
  max-width:100%;
  border-radius:2px;
  overflow:hidden;
}

/* HEADER */
.header{
  background:#242362;
  color:#fff;
  padding:18px 20px;
}

.header h2{
  margin:6px 0 0;
  font-size:20px;
  font-weight:700;
}

.badge{
  display:inline-block;
  background:rgba(255,255,255,.2);
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  margin-bottom:6px;
}

/* INFO */
.info{
  background:#f5f6f8;
  padding:14px 20px;
  font-size:13px;
}

.controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.chips span{
  background:#e5e7eb;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  margin-right:6px;
}

/* CARDS */
.cards{
  display:flex;
  gap:12px;
  padding:14px 20px;
  overflow:hidden;
}

.card{
  min-width:180px;
  background:#fff;
  border-radius:2px;
  padding:14px;
  border:1px solid #e5e7eb;
}

.initial{
  background:#242362;
  color:#fff;
  width:42px;
  height:42px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  margin-bottom:10px;
}

.tag{
  font-size:11px;
  background:#eef2ff;
  color:#242362;
  padding:4px 8px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:6px;
}

.name{
  font-size:13px;
  font-weight:700;
  color:#242362;
  margin-bottom:6px;
}

.date{
  font-size:16px;
  font-weight:700;
  color:#242362;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="badge">🎉 É festa!</div>
    <h2>Aniversariantes dos próximos 7 dias</h2>
  </div>

  <div class="info">
    <div><strong>Período:</strong> 31 de março a 6 de abril</div>

    <div class="controls">
      <div class="chips">
        <span>Próximos dias</span>
        <span>Hoje</span>
      </div>
      <div>‹ ›</div>
    </div>
  </div>

  <div class="cards">

    <div class="card">
      <div class="initial">YR</div>
      <div class="tag">EM 3 DIAS</div>
      <div class="name">YASMIN RIBEIRO DE SOUZA</div>
      <div class="date">03/04</div>
    </div>

    <div class="card">
      <div class="initial">LY</div>
      <div class="tag">EM 5 DIAS</div>
      <div class="name">LUCIANA YUMI KIKUCHI</div>
      <div class="date">05/04</div>
    </div>

    <div class="card">
      <div class="initial">OA</div>
      <div class="tag">EM 5 DIAS</div>
      <div class="name">ORLANDO APARECIDO</div>
      <div class="date">05/04</div>
    </div>

  </div>

</div>

</body>
</html>
