<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --azul:#242362;
  --azul-claro:#eef2ff;
  --borda:#d9deea;
  --fundo:#f7f8fb;
  --texto:#242362;
  --texto-sec:#5e6785;
  --radius:2px;
  --gap:14px;
  --card-width: 190px;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  background:transparent;
  font-family:"Segoe UI", Arial, sans-serif;
  overflow:hidden;
}

.widget{
  width:100%;
  border-radius:var(--radius);
  overflow:hidden;
  background:#fff;
  border:1px solid var(--borda);
}

/* HEADER */
.header{
  background:var(--azul);
  color:#fff;
  padding:16px 18px;
}

.badge{
  display:inline-block;
  background:rgba(255,255,255,.2);
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  margin-bottom:6px;
}

.header h2{
  margin:0;
  font-size:18px;
  font-weight:700;
}

/* SUBBAR */
.subbar{
  background:var(--fundo);
  padding:12px 18px;
  border-bottom:1px solid var(--borda);
}

.periodo{
  font-size:13px;
  margin-bottom:8px;
}

.controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chips span{
  background:#eef1f7;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  margin-right:6px;
}

/* CARDS */
.cards-area{
  padding:14px 18px;
}

.viewport{
  overflow:hidden;
}

.track{
  display:flex;
  gap:var(--gap);
  transition:transform .4s ease;
}

.card{
  min-width:var(--card-width);
  border:1px solid var(--borda);
  border-radius:var(--radius);
  padding:14px;
  background:#fff;
}

.initials{
  width:42px;
  height:42px;
  background:var(--azul);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  border-radius:8px;
  margin-bottom:10px;
}

.tag{
  font-size:11px;
  background:var(--azul-claro);
  color:var(--azul);
  padding:4px 8px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:6px;
}

.name{
  font-size:13px;
  font-weight:700;
  color:var(--texto);
  margin-bottom:6px;
}

.date{
  font-size:16px;
  font-weight:700;
  color:var(--azul);
}

.empty{
  font-size:13px;
  color:#666;
}

</style>
</head>

<body>

<div class="widget">

  <div class="header">
    <div class="badge">🎉 É festa!</div>
    <h2>Aniversariantes dos próximos 7 dias</h2>
  </div>

  <div class="subbar">
    <div class="periodo" id="periodo"></div>

    <div class="controls">
      <div class="chips">
        <span>Próximos dias</span>
        <span>Hoje</span>
      </div>
      <div>
        <button onclick="prev()">‹</button>
        <button onclick="next()">›</button>
      </div>
    </div>
  </div>

  <div class="cards-area">
    <div class="viewport">
      <div class="track" id="track"></div>
    </div>
  </div>

</div>

<script>
const track = document.getElementById('track');
const periodoEl = document.getElementById('periodo');

let dataFiltrada = [];
let index = 0;
let visible = 3;

function getVisible(){
  if(window.innerWidth < 600) return 1;
  if(window.innerWidth < 900) return 2;
  return 3;
}

function formatDate(d){
  return d.toLocaleDateString('pt-BR',{day:'numeric',month:'long'});
}

function initials(nome){
  const p = nome.split(' ');
  return (p[0][0] + (p[1]?.[0]||'')).toUpperCase();
}

function processar(data){

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const fim = new Date(hoje);
  fim.setDate(hoje.getDate()+6);

  periodoEl.innerHTML = `
    <strong>Período:</strong> ${formatDate(hoje)} a ${formatDate(fim)}
  `;

  dataFiltrada = data.map(p => {
    const [ano,mes,dia] = p.DATANASCIMENTO.split('-').map(Number);
    const dataAtual = new Date(hoje.getFullYear(), mes-1, dia);

    const diff = Math.round((dataAtual-hoje)/(1000*60*60*24));

    if(diff >=0 && diff <=6){
      return {
        nome:p.NOME,
        dia,
        mes,
        diff,
        tag: diff===0?'HOJE': diff===1?'AMANHÃ':`EM ${diff} DIAS`
      }
    }
  }).filter(Boolean).sort((a,b)=>a.diff-b.diff);

  render();
}

function render(){

  if(!dataFiltrada.length){
    track.innerHTML = '<div class="empty">Nenhum aniversariante nos próximos dias.</div>';
    return;
  }

  track.innerHTML = dataFiltrada.map(p => `
    <div class="card">
      <div class="initials">${initials(p.nome)}</div>
      <div class="tag">${p.tag}</div>
      <div class="name">${p.nome}</div>
      <div class="date">${String(p.dia).padStart(2,'0')}/${String(p.mes).padStart(2,'0')}</div>
    </div>
  `).join('');

  update();
}

function update(){
  visible = getVisible();
  const offset = index * (190 + 14);
  track.style.transform = `translateX(-${offset}px)`;
}

function next(){
  index = Math.min(index+1, dataFiltrada.length-visible);
  update();
}

function prev(){
  index = Math.max(index-1,0);
  update();
}

window.addEventListener('resize',update);

fetch('aniversariantes-proximos-7-dias.json')
  .then(r=>r.json())
  .then(processar)
  .catch(()=>{
    track.innerHTML = '<div class="empty">Erro ao carregar JSON</div>';
  });

</script>

</body>
</html>
